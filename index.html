<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Face Memory Game - Pro Custom</title>
<script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+JP:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --accent: #7c6dfa;
    --accent2: #fa6d9a;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --border: rgba(124,109,250,0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; overflow-x: hidden; }
  .container { max-width: 600px; margin: 0 auto; padding: 20px; }
  
  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  h1 { font-family: 'Syne', sans-serif; font-size: 1.5rem; background: linear-gradient(135deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  .lang-switch { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; font-weight: bold; }

  .intro-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 24px; }
  .intro-card h2 { color: var(--accent); font-size: 15px; margin-bottom: 10px; }
  .intro-card p { font-size: 13px; line-height: 1.6; }

  .guide-steps { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; gap: 8px; }
  .step { flex: 1; background: rgba(255, 255, 255, 0.03); padding: 10px 5px; border-radius: 10px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.05); }
  .step-num { color: var(--accent2); font-family: 'Syne'; font-size: 18px; font-weight: 800; display: block; }
  .step p { font-size: 10px; white-space: nowrap; }
  .step-arrow { color: var(--muted); font-size: 14px; }

  .safety-note { background: rgba(74, 222, 128, 0.05); border: 1px solid rgba(74, 222, 128, 0.2); border-radius: 12px; padding: 12px; margin-top: 15px; display: flex; align-items: flex-start; gap: 10px; font-size: 12px; color: #4ade80; }
  .more-link { display: inline-block; margin-top: 8px; color: var(--accent); text-decoration: underline; cursor: pointer; font-weight: 700; }

  .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal-content { background: var(--card); border: 1px solid var(--border); border-radius: 20px; width: 90%; max-width: 500px; padding: 24px; }
  .modal-body { font-size: 13px; line-height: 1.7; }
  .close-btn { margin-top: 20px; width: 100%; background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 12px; border-radius: 100px; cursor: pointer; }

  .upload-zone { border: 2px dashed var(--border); border-radius: 20px; padding: 40px 20px; text-align: center; background: var(--surface); cursor: pointer; }
  .upload-zone.loading { opacity: 0.5; pointer-events: none; }
  #fileInput { display: none; }

  .btn { display: inline-flex; align-items: center; justify-content: center; padding: 14px 24px; border-radius: 100px; font-weight: 700; cursor: pointer; border: none; font-size: 14px; transition: 0.2s; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; width: 100%; }
  .btn-ghost { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--border); margin-top: 10px; width: 100%; }

  .preview-section, .game-section { display: none; margin-top: 10px; animation: fadeIn 0.4s ease; }
  .preview-section.visible, .game-section.visible { display: block; }
  #originalCanvas { width: 100%; height: auto; border-radius: 12px; border: 1px solid var(--border); }
  
  .control-panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin: 15px 0; display: flex; flex-direction: column; gap: 16px; }
  .panel-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .status-group { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; }
  .count-badge { display: flex; align-items: center; gap: 6px; background: rgba(124,109,250,0.1); padding: 4px 10px; border-radius: 8px; font-size: 12px; }
  .badge-label { color: var(--muted); font-size: 10px; text-transform: uppercase; }
  #faceCountBadge { color: var(--accent); font-weight: 800; }

  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .status-dot.loading { background: var(--accent); animation: pulse 1.5s infinite; }
  .status-dot.done { background: #4ade80; }
  .status-dot.error { background: var(--accent2); }

  .slider-container { display: flex; flex-direction: column; gap: 10px; }
  .slider-info { display: flex; justify-content: space-between; font-size: 13px; font-weight: 700; }
  .value-highlight { color: var(--accent2); background: rgba(250,109,154,0.1); padding: 0 8px; border-radius: 4px; }
  .range-slider { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 5px; outline: none; appearance: none; cursor: pointer; }
  .range-slider::-webkit-slider-thumb { appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--accent); border: 2px solid white; cursor: pointer; }

  .game-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; perspective: 1000px; }
  @media (max-width: 450px) { .game-grid { grid-template-columns: repeat(3, 1fr); } }
  .memory-card { aspect-ratio: 1; position: relative; transform-style: preserve-3d; transition: transform 0.4s; cursor: pointer; }
  .memory-card.flipped { transform: rotateY(180deg); }
  .memory-card.matched { opacity: 0.3; pointer-events: none; transform: rotateY(180deg) scale(0.9); }
  .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
  .card-back { background: var(--card); color: var(--accent); font-size: 20px; font-weight: bold; }
  .card-front { background: #000; transform: rotateY(180deg); overflow: hidden; }
  .card-front img { width: 100%; height: 100%; object-fit: cover; }

  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.3); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>FACE MEMORY</h1>
    <button class="lang-switch" id="langBtn">English</button>
  </header>

  <div class="intro-card" id="introCard">
    <h2 class="t-title">✦ 写真で遊ぶ神経衰弱</h2>
    <p class="t-desc">AIが集合写真から顔を切り出します。友達や家族の写真で遊んでみよう！</p>
    
    <div class="guide-steps">
      <div class="step"><span class="step-num">1</span><p class="t-s1">写真をアップ</p></div>
      <div class="step-arrow">→</div>
      <div class="step"><span class="step-num">2</span><p class="t-s2">AIが抽出</p></div>
      <div class="step-arrow">→</div>
      <div class="step"><span class="step-num">3</span><p class="t-s3">ゲーム開始</p></div>
    </div>

    <div class="safety-note">
      <span style="font-size:20px">🛡️</span>
      <div>
        <strong class="t-safe">安心・安全！</strong><br>
        <span class="t-safedesc">写真はあなたのスマホ内だけで処理されます。</span><br>
        <span class="more-link t-more" id="moreLinkBtn">＜より詳しい説明はこちら＞</span>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
      <h3 id="modalTitle">🔒 技術的な安全性の証明</h3>
      <div class="modal-body" id="modalBody"></div>
      <button class="close-btn" id="modalCloseBtn">閉じる</button>
    </div>
  </div>

  <div class="upload-zone loading" id="uploadZone">
    <div id="statusIcon" style="font-size: 36px; margin-bottom: 8px;">⏳</div>
    <p id="uploadTitle" style="font-weight:700;">AIを準備中...</p>
    <button class="btn btn-primary" id="selectBtn" disabled style="margin-top:20px; width:auto;">Loading...</button>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div class="preview-section" id="previewSection">
    <canvas id="originalCanvas"></canvas>
    
    <div class="control-panel" id="controlPanel">
      <div class="panel-header">
        <div class="status-group">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusText">AIが顔を探しています...</span>
        </div>
        <div class="count-badge">
          <span class="badge-label" id="badgeLabel">検出</span>
          <span id="faceCountBadge">0人</span>
        </div>
      </div>

      <div class="slider-container" id="sliderArea" style="display:none;">
        <div class="slider-info">
          <span class="t-select-num">使用する人数</span>
          <span id="sliderValueText" class="value-highlight">0人</span>
        </div>
        <input type="range" id="pairSlider" class="range-slider" min="2" max="10" value="2">
      </div>
    </div>

    <button class="btn btn-primary" id="startGameBtn" style="display:none;">ゲームスタート！</button>
    <button class="btn btn-ghost" id="reUploadBtn">別の写真にする</button>
  </div>

  <div class="game-section" id="gameSection">
    <div style="font-weight: 700; margin-bottom: 12px; text-align:center;">
      <span class="t-remain">のこり</span>: <span id="gameRemain" style="color:var(--accent2); font-size: 1.2rem;">0</span> <span class="t-pair">ペア</span>
    </div>
    <div class="game-grid" id="gameGrid"></div>
    <button class="btn btn-ghost t-back" id="backBtn" style="margin-top:24px;">タイトルにもどる</button>
  </div>
</div>

<script>
let faceImages = [];
let flippedCards = [];
let isLock = false;
let pairsFound = 0;
let totalPairs = 0;
let currentLang = 'ja';
let lastDetectedCount = 0;

const translations = {
  ja: {
    title: "✦ 写真で遊ぶ神経衰弱", desc: "AIが集合写真から顔を切り出します。友達や家族の写真で遊んでみよう！",
    s1: "写真をアップ", s2: "AIが抽出", s3: "ゲーム開始", safe: "安心・安全！", safedesc: "写真はあなたのスマホ内だけで処理されます。",
    more: "＜より詳しい説明はこちら＞", loading: "AIを準備中...", select: "写真を選ぶ", start: "ゲームスタート！",
    reset: "別の写真にする", remain: "のこり", pair: "ペア", back: "タイトルにもどる", 
    detecting: "AIが顔を探しています...", analyzing: "高精度AIが解析中...", done: "解析完了！", error: "2人以上の顔が必要です",
    selectNum: "使用する人数", badge: "検出", modalT: "🔒 技術的な安全性の証明",
    modalB: "本アプリは、顔認識ライブラリ face-api.js を使用し、すべての演算をブラウザ上で行う「クライアントサイド処理」を採用しています。画像はメモリ内の一時的な処理に使用され、サーバーへのアップロードは一切行われません。", modalC: "閉じる",
    uploadReady: "写真をアップロード", unit: "人", clear: "クリア！"
  },
  en: {
    title: "✦ Face Memory Game", desc: "AI extracts faces from photos. Play with your family and friends!",
    s1: "Upload", s2: "AI Extract", s3: "Start Game", safe: "Safe & Private!", safedesc: "Your photos are processed only on your device.",
    more: "<Technical Details>", loading: "Loading AI...", select: "Choose Photo", start: "Start Game!",
    reset: "Pick another photo", remain: "Remain", pair: "Pairs", back: "Back to Title",
    detecting: "AI is looking for faces...", analyzing: "AI is analyzing...", done: "Analysis Complete!", error: "Need at least 2 faces",
    selectNum: "Number of People", badge: "Found", modalT: "🔒 Technical Security",
    modalB: "This app uses face-api.js for local browser-side processing. Images are never uploaded to any server, ensuring complete privacy.", modalC: "Close",
    uploadReady: "Upload Photo", unit: " faces", clear: "CLEAR!"
  }
};

async function init() {
  const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
  try {
    await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
    document.getElementById('uploadZone').classList.remove('loading');
    document.getElementById('statusIcon').textContent = '📸';
    document.getElementById('selectBtn').disabled = false;
    updateUI(); 
  } catch (e) {
    document.getElementById('uploadTitle').textContent = "Model Error";
  }
}

function updateUI() {
  const t = translations[currentLang];
  
  // 各種ラベルの更新
  document.querySelector('.t-title').textContent = t.title;
  document.querySelector('.t-desc').textContent = t.desc;
  document.querySelector('.t-s1').textContent = t.s1;
  document.querySelector('.t-s2').textContent = t.s2;
  document.querySelector('.t-s3').textContent = t.s3;
  document.querySelector('.t-safe').textContent = t.safe;
  document.querySelector('.t-safedesc').textContent = t.safedesc;
  document.querySelector('.t-more').textContent = t.more;
  document.getElementById('startGameBtn').textContent = t.start;
  document.getElementById('reUploadBtn').textContent = t.reset;
  document.querySelector('.t-remain').textContent = t.remain;
  document.querySelector('.t-pair').textContent = t.pair;
  document.getElementById('backBtn').textContent = t.back;
  document.querySelector('.t-select-num').textContent = t.selectNum;
  document.getElementById('badgeLabel').textContent = t.badge;
  document.getElementById('langBtn').textContent = currentLang === 'ja' ? 'English' : '日本語';

  // アップロードエリアとボタンの翻訳
  const selectBtn = document.getElementById('selectBtn');
  const uploadTitle = document.getElementById('uploadTitle');
  if (selectBtn.disabled) {
    uploadTitle.textContent = t.loading;
    selectBtn.textContent = "Loading...";
  } else {
    uploadTitle.textContent = t.uploadReady;
    selectBtn.textContent = t.select;
  }

  // ステータス表示の翻訳 (状態に応じて)
  const statusText = document.getElementById('statusText');
  const dot = document.getElementById('statusDot');
  if (dot.classList.contains('loading')) {
    statusText.textContent = t.analyzing;
  } else if (dot.classList.contains('done')) {
    statusText.textContent = t.done;
  } else if (dot.classList.contains('error')) {
    statusText.textContent = t.error;
  } else {
    statusText.textContent = t.detecting;
  }

  // カウント表示の更新
  document.getElementById('faceCountBadge').textContent = lastDetectedCount + t.unit;

  updateSliderText();
}

function updateSliderText() {
  const val = document.getElementById('pairSlider').value;
  document.getElementById('sliderValueText').textContent = val + translations[currentLang].unit;
}

function resetToUpload() {
  faceImages = [];
  flippedCards = [];
  isLock = false;
  pairsFound = 0;
  lastDetectedCount = 0;
  document.getElementById('fileInput').value = ""; 
  document.getElementById('introCard').style.display = 'block';
  document.getElementById('uploadZone').style.display = 'block';
  document.getElementById('previewSection').style.display = 'none';
  document.getElementById('gameSection').style.display = 'none';
  document.getElementById('sliderArea').style.display = 'none';
  document.getElementById('startGameBtn').style.display = 'none';
  document.getElementById('statusDot').className = 'status-dot';
  document.getElementById('faceCountBadge').textContent = "0" + translations[currentLang].unit;
  updateUI();
}

async function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;

  document.getElementById('introCard').style.display = 'none';
  document.getElementById('uploadZone').style.display = 'none';
  document.getElementById('previewSection').style.display = 'block';
  
  const statusLabel = document.getElementById('statusText');
  const dot = document.getElementById('statusDot');
  statusLabel.textContent = translations[currentLang].analyzing;
  dot.className = 'status-dot loading';

  try {
    const img = await faceapi.bufferToImage(file);
    const canvas = document.getElementById('originalCanvas');
    const displaySize = { width: img.width, height: img.height };
    faceapi.matchDimensions(canvas, displaySize);

    const detections = await faceapi.detectAllFaces(img, new faceapi.SsdMobilenetv1Options({ minConfidence: 0.4 }));
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    
    lastDetectedCount = detections.length;
    document.getElementById('faceCountBadge').textContent = lastDetectedCount + translations[currentLang].unit;

    if (detections.length < 2) {
      statusLabel.textContent = translations[currentLang].error;
      dot.className = 'status-dot error';
      return;
    }

    statusLabel.textContent = translations[currentLang].done;
    dot.className = 'status-dot done';

    const slider = document.getElementById('pairSlider');
    slider.max = detections.length;
    slider.value = detections.length;
    updateSliderText();
    document.getElementById('sliderArea').style.display = 'flex';

    faceImages = detections.map(d => {
      const { x, y, width, height } = d.box;
      ctx.strokeStyle = '#7c6dfa';
      ctx.lineWidth = Math.max(4, img.width / 250);
      ctx.strokeRect(x, y, width, height);

      const fCanvas = document.createElement('canvas');
      fCanvas.width = 150; fCanvas.height = 150;
      const pad = width * 0.1;
      fCanvas.getContext('2d').drawImage(img, x - pad, y - pad, width + pad*2, height + pad*2, 0, 0, 150, 150);
      return fCanvas.toDataURL();
    });

    document.getElementById('startGameBtn').style.display = 'flex';
  } catch (err) {
    statusLabel.textContent = "Error";
    dot.className = 'status-dot error';
  }
}

function startMemoryGame() {
  const selectedCount = parseInt(document.getElementById('pairSlider').value);
  const selectedFaces = [...faceImages].sort(() => Math.random() - 0.5).slice(0, selectedCount);

  document.getElementById('previewSection').style.display = 'none';
  document.getElementById('gameSection').style.display = 'block';
  document.getElementById('gameSection').classList.add('visible');
  
  const grid = document.getElementById('gameGrid');
  grid.innerHTML = '';
  totalPairs = selectedCount;
  document.getElementById('gameRemain').textContent = totalPairs;

  const cards = [...selectedFaces, ...selectedFaces].sort(() => Math.random() - 0.5);

  cards.forEach(src => {
    const card = document.createElement('div');
    card.className = 'memory-card';
    card.dataset.id = src;
    card.innerHTML = `<div class="card-face card-back">?</div><div class="card-face card-front"><img src="${src}"></div>`;
    card.onclick = () => {
      if (isLock || card.classList.contains('flipped') || card.classList.contains('matched')) return;
      card.classList.add('flipped');
      flippedCards.push(card);
      if (flippedCards.length === 2) {
        isLock = true;
        const [c1, c2] = flippedCards;
        if (c1.dataset.id === c2.dataset.id) {
          setTimeout(() => {
            c1.classList.add('matched'); c2.classList.add('matched');
            pairsFound++;
            document.getElementById('gameRemain').textContent = totalPairs - pairsFound;
            flippedCards = []; isLock = false;
            if (pairsFound === totalPairs) alert(translations[currentLang].clear);
          }, 500);
        } else {
          setTimeout(() => {
            c1.classList.remove('flipped'); c2.classList.remove('flipped');
            flippedCards = []; isLock = false;
          }, 800);
        }
      }
    };
    grid.appendChild(card);
  });
}

document.getElementById('langBtn').onclick = () => { currentLang = currentLang === 'ja' ? 'en' : 'ja'; updateUI(); };
document.getElementById('uploadZone').onclick = () => document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = handleFile;
document.getElementById('reUploadBtn').onclick = resetToUpload;
document.getElementById('backBtn').onclick = resetToUpload;
document.getElementById('startGameBtn').onclick = startMemoryGame;
document.getElementById('pairSlider').oninput = updateSliderText;
document.getElementById('moreLinkBtn').onclick = () => {
  const t = translations[currentLang];
  document.getElementById('modalTitle').textContent = t.modalT;
  document.getElementById('modalBody').textContent = t.modalB;
  document.getElementById('modalCloseBtn').textContent = t.modalC;
  document.getElementById('modalOverlay').style.display = 'flex';
};
document.getElementById('modalCloseBtn').onclick = () => document.getElementById('modalOverlay').style.display = 'none';

window.onload = init;
</script>
</body>
</html>
